# Golden Q&A set for AlphaAgent eval harness.
# 30 questions spanning 3 difficulty tiers.
#
# Each question has:
#   id                   : stable identifier
#   difficulty           : easy | medium | hard
#   category             : factual | analytical | comparative | risk | attribution
#   question             : user-facing natural-language question
#   expected_sql_contains: substrings the generated SQL MUST contain (any-of if list)
#   expected_row_count   : expected result cardinality band (or null if variable)
#   reference_sql        : the "correct" SQL written by hand — used to compare results
#   notes                : hints for debugging

- id: E001
  difficulty: easy
  category: factual
  question: "What is the latest YTD return for portfolio P-001?"
  expected_sql_contains: ["portfolio_performance_daily", "ytd_return", "P-001"]
  reference_sql: |
    SELECT ytd_return
    FROM marts.fct_portfolio_performance_daily
    WHERE portfolio_id = 'P-001'
    ORDER BY as_of_date DESC LIMIT 1;

- id: E002
  difficulty: easy
