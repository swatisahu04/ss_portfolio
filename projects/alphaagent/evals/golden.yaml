# ---------- medium ----------

- id: M011
  difficulty: medium
  category: comparative
  question: "Which Growth-strategy portfolios are beating SPY YTD, and by how much?"
  expected_sql_contains: ["Growth", "spy_excess_return_ytd", "dim_portfolios"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_performance_daily GROUP BY portfolio_id
    )
    SELECT p.portfolio_id, f.ytd_return, f.spy_excess_return_ytd
    FROM marts.fct_portfolio_performance_daily f
    JOIN latest USING (portfolio_id, as_of_date)
    JOIN marts.dim_portfolios p USING (portfolio_id)
    WHERE p.strategy = 'Growth' AND f.spy_excess_return_ytd > 0
    ORDER BY f.spy_excess_return_ytd DESC;

- id: M012
  difficulty: medium
  category: risk
  question: "Which 5 portfolios have the highest 30-day Sharpe ratio?"
  expected_sql_contains: ["sharpe_30d", "ORDER BY"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_risk_daily GROUP BY portfolio_id
    )
    SELECT r.portfolio_id, r.sharpe_30d
    FROM marts.fct_portfolio_risk_daily r
    JOIN latest USING (portfolio_id, as_of_date)
    ORDER BY r.sharpe_30d DESC NULLS LAST LIMIT 5;

- id: M013
  difficulty: medium
  category: analytical
  question: "What is the average YTD return by strategy?"
  expected_sql_contains: ["strategy", "AVG", "ytd_return"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_performance_daily GROUP BY portfolio_id
    )
    SELECT p.strategy, AVG(f.ytd_return) AS avg_ytd
    FROM marts.fct_portfolio_performance_daily f
    JOIN latest USING (portfolio_id, as_of_date)
    JOIN marts.dim_portfolios p USING (portfolio_id)
    GROUP BY p.strategy ORDER BY avg_ytd DESC;

- id: M014
  difficulty: medium
  category: attribution
  question: "Top 5 contributing sectors for portfolio P-001 today."
  expected_sql_contains: ["sector", "contribution_to_return", "P-001"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution WHERE portfolio_id = 'P-001'
    )
    SELECT sector, SUM(contribution_to_return) AS sector_contrib
    FROM marts.fct_position_attribution, latest
    WHERE portfolio_id = 'P-001' AND as_of_date = latest.d
    GROUP BY sector ORDER BY sector_contrib DESC LIMIT 5;

- id: M015
  difficulty: medium
  category: analytical
  question: "Total AUM across all portfolios."
  expected_sql_contains: ["SUM", "current_nav"]
  reference_sql: "SELECT SUM(current_nav_usd) FROM marts.dim_portfolios;"

- id: M016
  difficulty: medium
  category: risk
  question: "Average 30-day volatility by strategy."
  expected_sql_contains: ["strategy", "vol_30d", "AVG"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_risk_daily GROUP BY portfolio_id
    )
    SELECT p.strategy, AVG(r.vol_30d) AS avg_vol
    FROM marts.fct_portfolio_risk_daily r
    JOIN latest USING (portfolio_id, as_of_date)
    JOIN marts.dim_portfolios p USING (portfolio_id)
    GROUP BY p.strategy;

- id: M017
  difficulty: medium
  category: analytical
  question: "Which portfolios have the highest turnover this month?"
  expected_sql_contains: ["turnover_ratio"]
  reference_sql: |
    SELECT portfolio_id, AVG(turnover_ratio) AS avg_turnover
    FROM marts.fct_trade_activity_daily
    WHERE trade_date >= date_trunc('month', CURRENT_DATE)
    GROUP BY portfolio_id ORDER BY avg_turnover DESC NULLS LAST LIMIT 10;

- id: M018
  difficulty: medium
  category: comparative
  question: "Compare Growth vs Value strategy average YTD return."
  expected_sql_contains: ["Growth", "Value"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_performance_daily GROUP BY portfolio_id
    )
    SELECT p.strategy, AVG(f.ytd_return) AS avg_ytd
    FROM marts.fct_portfolio_performance_daily f
    JOIN latest USING (portfolio_id, as_of_date)
    JOIN marts.dim_portfolios p USING (portfolio_id)
    WHERE p.strategy IN ('Growth', 'Value') GROUP BY p.strategy;

- id: M019
  difficulty: medium
  category: attribution
  question: "Which securities have the highest weight across all Growth portfolios?"
  expected_sql_contains: ["weight", "Growth"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution
    )
    SELECT pa.ticker, SUM(pa.weight * p.current_nav_usd) AS weighted_value
    FROM marts.fct_position_attribution pa
    JOIN marts.dim_portfolios p USING (portfolio_id)
    CROSS JOIN latest
    WHERE p.strategy = 'Growth' AND pa.as_of_date = latest.d
    GROUP BY pa.ticker ORDER BY weighted_value DESC LIMIT 10;

- id: M020
  difficulty: medium
  category: analytical
  question: "Show daily total trading volume (in USD) for the last 30 days."
  expected_sql_contains: ["total_gross_usd", "trade_date"]
  reference_sql: |
    SELECT trade_date, SUM(total_gross_usd) AS total_volume
    FROM marts.fct_trade_activity_daily
    WHERE trade_date >= CURRENT_DATE - INTERVAL '30 days'
    GROUP BY trade_date ORDER BY trade_date;

# ---------- hard ----------

- id: H021
  difficulty: hard
  category: attribution
  question: "For portfolio P-007's latest day, decompose return by sector and show contribution vs weight."
  expected_sql_contains: ["sector", "contribution_to_return", "weight", "P-007"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution WHERE portfolio_id = 'P-007'
    )
    SELECT sector,
           SUM(weight) AS sector_weight,
           SUM(contribution_to_return) AS sector_contrib
    FROM marts.fct_position_attribution, latest
    WHERE portfolio_id = 'P-007' AND as_of_date = latest.d
    GROUP BY sector ORDER BY sector_contrib DESC;

- id: H022
  difficulty: hard
  category: risk
  question: "Find portfolios whose vol_30d is > 2x the strategy average."
  expected_sql_contains: ["vol_30d", "strategy"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_risk_daily GROUP BY portfolio_id
    ),
    current_risk AS (
      SELECT r.portfolio_id, r.vol_30d, p.strategy
      FROM marts.fct_portfolio_risk_daily r
      JOIN latest USING (portfolio_id, as_of_date)
      JOIN marts.dim_portfolios p USING (portfolio_id)
    ),
    strategy_avg AS (
      SELECT strategy, AVG(vol_30d) AS avg_vol FROM current_risk GROUP BY strategy
    )
    SELECT c.portfolio_id, c.strategy, c.vol_30d, s.avg_vol
    FROM current_risk c JOIN strategy_avg s USING (strategy)
    WHERE c.vol_30d > 2 * s.avg_vol;

- id: H023
  difficulty: hard
  category: comparative
  question: "Which portfolios are beating both SPY and AGG YTD?"
  expected_sql_contains: ["spy_excess_return_ytd", "agg_excess_return_ytd"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_performance_daily GROUP BY portfolio_id
    )
    SELECT f.portfolio_id, f.ytd_return, f.spy_excess_return_ytd, f.agg_excess_return_ytd
    FROM marts.fct_portfolio_performance_daily f
    JOIN latest USING (portfolio_id, as_of_date)
    WHERE f.spy_excess_return_ytd > 0 AND f.agg_excess_return_ytd > 0
    ORDER BY f.ytd_return DESC;

- id: H024
  difficulty: hard
  category: risk
  question: "For each strategy, which portfolio has the best Sharpe ratio?"
  expected_sql_contains: ["sharpe_30d", "strategy", "ROW_NUMBER"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_risk_daily GROUP BY portfolio_id
    ),
    ranked AS (
      SELECT p.strategy, r.portfolio_id, r.sharpe_30d,
             ROW_NUMBER() OVER (PARTITION BY p.strategy ORDER BY r.sharpe_30d DESC NULLS LAST) AS rn
      FROM marts.fct_portfolio_risk_daily r
      JOIN latest USING (portfolio_id, as_of_date)
      JOIN marts.dim_portfolios p USING (portfolio_id)
    )
    SELECT strategy, portfolio_id, sharpe_30d FROM ranked WHERE rn = 1;

- id: H025
  difficulty: hard
  category: attribution
  question: "Which 10 stocks are the biggest positive contributors across all portfolios today?"
  expected_sql_contains: ["ticker", "contribution_to_return", "SUM"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution
    )
    SELECT pa.ticker, SUM(pa.contribution_to_return * p.current_nav_usd) AS dollar_impact
    FROM marts.fct_position_attribution pa
    JOIN marts.dim_portfolios p USING (portfolio_id), latest
    WHERE pa.as_of_date = latest.d AND pa.contribution_to_return > 0
    GROUP BY pa.ticker ORDER BY dollar_impact DESC LIMIT 10;

- id: H026
  difficulty: hard
  category: analytical
  question: "Monthly compounded returns for portfolio P-001 over the last 6 months."
  expected_sql_contains: ["P-001", "date_trunc", "exp", "sum", "ln"]
  notes: "Requires the model to reconstruct monthly compounding from daily returns."
  reference_sql: |
    SELECT date_trunc('month', as_of_date) AS month,
           EXP(SUM(LN(1 + COALESCE(daily_return, 0)))) - 1 AS monthly_return
    FROM marts.fct_portfolio_performance_daily
    WHERE portfolio_id = 'P-001'
      AND as_of_date >= CURRENT_DATE - INTERVAL '6 months'
    GROUP BY date_trunc('month', as_of_date)
    ORDER BY month;

- id: H027
  difficulty: hard
  category: risk
  question: "Which portfolios are most market-neutral (|beta| < 0.2)?"
  expected_sql_contains: ["beta_vs_spy_30d", "ABS"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_risk_daily GROUP BY portfolio_id
    )
    SELECT r.portfolio_id, r.beta_vs_spy_30d
    FROM marts.fct_portfolio_risk_daily r
    JOIN latest USING (portfolio_id, as_of_date)
    WHERE ABS(r.beta_vs_spy_30d) < 0.2
    ORDER BY ABS(r.beta_vs_spy_30d);

- id: H028
  difficulty: hard
  category: comparative
  question: "Rank strategies by risk-adjusted return (average YTD / average vol)."
  expected_sql_contains: ["ytd_return", "vol_30d", "strategy"]
  reference_sql: |
    WITH latest AS (
      SELECT portfolio_id, MAX(as_of_date) AS as_of_date
      FROM marts.fct_portfolio_performance_daily GROUP BY portfolio_id
    ),
    perf AS (
      SELECT p.strategy, AVG(f.ytd_return) AS avg_ytd
      FROM marts.fct_portfolio_performance_daily f
      JOIN latest USING (portfolio_id, as_of_date)
      JOIN marts.dim_portfolios p USING (portfolio_id)
      GROUP BY p.strategy
    ),
    risk AS (
      SELECT p.strategy, AVG(r.vol_30d) AS avg_vol
      FROM marts.fct_portfolio_risk_daily r
      JOIN latest USING (portfolio_id, as_of_date)
      JOIN marts.dim_portfolios p USING (portfolio_id)
      GROUP BY p.strategy
    )
    SELECT perf.strategy, perf.avg_ytd, risk.avg_vol,
           perf.avg_ytd / NULLIF(risk.avg_vol, 0) AS risk_adj
    FROM perf JOIN risk USING (strategy) ORDER BY risk_adj DESC;

- id: H029
  difficulty: hard
  category: attribution
  question: "Show the 5 worst-contributing stocks across all ESG portfolios for the latest day."
  expected_sql_contains: ["ESG", "contribution_to_return", "ticker"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution
    )
    SELECT pa.ticker, SUM(pa.contribution_to_return) AS total_contrib
    FROM marts.fct_position_attribution pa
    JOIN marts.dim_portfolios p USING (portfolio_id), latest
    WHERE p.strategy = 'ESG' AND pa.as_of_date = latest.d
    GROUP BY pa.ticker ORDER BY total_contrib ASC LIMIT 5;

- id: H030
  difficulty: hard
  category: analytical
  question: "For the latest day, what is the portfolio concentration (top-10 weight) per portfolio?"
  expected_sql_contains: ["weight", "ROW_NUMBER", "portfolio_id"]
  reference_sql: |
    WITH latest AS (
      SELECT MAX(as_of_date) AS d FROM marts.fct_position_attribution
    ),
    ranked AS (
      SELECT portfolio_id, weight,
             ROW_NUMBER() OVER (PARTITION BY portfolio_id ORDER BY weight DESC) AS rn
      FROM marts.fct_position_attribution, latest
      WHERE as_of_date = latest.d
    )
    SELECT portfolio_id, SUM(weight) AS top10_weight
    FROM ranked WHERE rn <= 10
    GROUP BY portfolio_id ORDER BY top10_weight DESC;
