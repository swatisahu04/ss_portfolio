name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest (unit)
        run: pytest tests/unit -v --cov=. --cov-report=term

  dbt-compile:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphaagent
          POSTGRES_PASSWORD: alphaagent
          POSTGRES_DB: alphaagent
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install dbt-postgres dbt-core
      - name: dbt deps + compile
        working-directory: dbt_project
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DB: alphaagent
          PG_USER: alphaagent
          PG_PASSWORD: alphaagent
        run: |
          dbt deps
          dbt compile --profiles-dir .

  agent-eval-regression:
    # Runs the agent against a small sanity-check eval subset.
    # Gate: PR must not drop below previous commit's score by > 5%.
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run eval (dry mode — no LLM calls, parser only)
        run: python -m evals.run --dry-run --questions evals/golden.yaml
