# AlphaAgent — local dev infrastructure
# Postgres as warehouse stand-in | Redpanda for Kafka | Airflow | Marquez for lineage
services:

  postgres:
    image: postgres:16-alpine
    container_name: alphaagent-postgres
    environment:
      POSTGRES_USER: alphaagent
      POSTGRES_PASSWORD: alphaagent
      POSTGRES_DB: alphaagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaagent -d alphaagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    # Kafka-compatible, single binary, arm64-native (Apple Silicon friendly)
    image: redpandadata/redpanda:v24.2.1
    container_name: alphaagent-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"   # admin
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  marquez-db:
    image: postgres:16-alpine
    container_name: alphaagent-marquez-db
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez_db_data:/var/lib/postgresql/data

  marquez:
    image: marquezproject/marquez:0.49.0
    container_name: alphaagent-marquez
    depends_on:
      - marquez-db
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      - "5000:5000"
      - "5001:5001"

  marquez-web:
    image: marquezproject/marquez-web:0.49.0
    container_name: alphaagent-marquez-web
    depends_on:
      - marquez
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    ports:
      - "3000:3000"

  airflow:
    image: apache/airflow:2.9.3-python3.11
    container_name: alphaagent-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://alphaagent:alphaagent@postgres:5432/alphaagent
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
      AIRFLOW__WEBSERVER__SECRET_KEY: "alphaagent-dev-key-do-not-use-in-prod"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://marquez:5000"}'
      AIRFLOW__OPENLINEAGE__NAMESPACE: "alphaagent"
      _PIP_ADDITIONAL_REQUIREMENTS: "openlineage-airflow apache-airflow-providers-openlineage dbt-core dbt-postgres"
      _AIRFLOW_DB_MIGRATE: "True"
      _AIRFLOW_WWW_USER_CREATE: "True"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: bash -c "airflow standalone"

volumes:
  postgres_data:
  marquez_db_data:
  airflow_logs:
