name: "alphaagent"
version: "0.1.0"
config-version: 2

profile: "alphaagent"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  alphaagent:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      +persist_docs:
        relation: true
        columns: true

# Tags let us slice by business domain
# (helps with partial runs, e.g. dbt run --select tag:performance)
seeds:
  alphaagent:
    +schema: raw
