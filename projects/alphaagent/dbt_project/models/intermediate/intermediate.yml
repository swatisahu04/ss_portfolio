version: 2

models:
  - name: int_position_valuations
    description: Position quantity × close price = market value per position-day.
  - name: int_portfolio_daily_totals
    description: One row per portfolio-day with NAV and value-weighted daily return.
    columns:
      - name: portfolio_id
        tests: [not_null]
      - name: position_date
        tests: [not_null]
  - name: int_benchmark_returns
